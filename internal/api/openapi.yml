openapi: 3.0.3
info:
  title: DBBat API
  description: |
    REST API for DBBat Database Observability Proxy.

    DBBat is a transparent PostgreSQL proxy for query observability, access control, and safety.

    ## Authentication

    The API supports two authentication methods:

    - **Basic Auth**: HTTP Basic Authentication using username and password
    - **Bearer Token**: API key authentication using `Authorization: Bearer <api-key>`

    API keys cannot create or revoke other API keys (security restriction) - these operations require Basic Auth.

    ## Roles

    Users have one or more roles that determine their access:

    - **admin**: Full access to all resources and operations
    - **viewer**: Read-only access to observability data (connections, queries, audit)
    - **connector**: Can only access databases they have active grants for

    ## Password Change Requirement

    Users must change their initial password before logging in.
    Login attempts from users who haven't changed their password will receive a `403 Forbidden` response with error code `PASSWORD_CHANGE_REQUIRED`.
    Users must then call `PUT /auth/password` with their username and credentials to change their password before they can log in.

    ## Rate Limiting

    All authenticated endpoints are rate-limited. Response headers include:

    - `X-RateLimit-Limit`: Maximum requests per minute
    - `X-RateLimit-Remaining`: Remaining requests in current window
    - `X-RateLimit-Reset`: Unix timestamp when limit resets

    ## Authentication Rate Limiting

    Failed login attempts are rate-limited per username with exponential backoff:

    - 1-2 failures: no delay
    - 3-4 failures: 5 seconds
    - 5-6 failures: 30 seconds
    - 7-9 failures: 2 minutes
    - 10+ failures: 5 minutes

    Rate-limited authentication attempts receive a `429 Too Many Requests` response with error code `auth_rate_limited`.
  version: 1.0.0
  contact:
    name: DBBat

servers:
  - url: /api/v1
    description: API v1 server

tags:
  - name: Health
    description: Health check endpoint
  - name: Version
    description: Version and build information
  - name: Auth
    description: Authentication (login, logout, session management)
  - name: Users
    description: User management
  - name: Databases
    description: Database configuration management
  - name: Grants
    description: Access grant management
  - name: API Keys
    description: API key management
  - name: Connections
    description: Connection observability
  - name: Queries
    description: Query observability
  - name: Audit
    description: Audit log

security:
  - basicAuth: []
  - bearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns the health status of the API server and database connection.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /version:
    get:
      tags:
        - Version
      summary: Get version information
      description: Returns API version and build information.
      operationId: getVersion
      security: []
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login and create web session
      description: |
        Authenticates with username/password and creates a short-lived web session token.

        The token should be stored and used as a Bearer token for subsequent API calls.
        Web session tokens expire after 1 hour.

        **Important**: Users who haven't changed their initial password will receive a 403 error.
        They must first change their password using `PUT /auth/password` before logging in.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Password change required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/AuthRateLimited'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout and revoke web session
      description: |
        Revokes the current web session token.

        After logout, the token will no longer be valid for authentication.
      operationId: logout
      responses:
        '204':
          description: Logout successful
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current user and session info
      description: |
        Returns information about the currently authenticated user and their session.

        Use this endpoint to:
        - Validate that a session token is still valid
        - Check if password change is required
        - Get session expiration time
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user and session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password:
    put:
      tags:
        - Auth
      summary: Change password (pre-login)
      description: |
        Allows users to change their password before logging in.
        Used for initial password change or password reset flows.

        Does not require authentication - validates username/current_password.
        Subject to rate limiting (same as login).

        After changing password, users can login using `POST /auth/login`.
      operationId: changePasswordPreLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreLoginPasswordChangeRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Weak password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [weak_password]
                  message:
                    type: string
                required:
                  - error
                  - message
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/AuthRateLimited'

  /auth/providers:
    get:
      tags:
        - Auth
      summary: List authentication providers
      description: Returns enabled authentication methods. Used by the frontend to show login options.
      operationId: listAuthProviders
      security: []
      responses:
        '200':
          description: List of auth providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [password, slack]
                        enabled:
                          type: boolean
                        authorize_url:
                          type: string
                          description: URL to initiate OAuth flow (only for OAuth providers)

  /auth/slack:
    get:
      tags:
        - Auth
      summary: Initiate Slack OAuth login
      description: Redirects to Slack's authorization page. After approval, Slack redirects back to the callback endpoint.
      operationId: initiateSlackAuth
      security: []
      parameters:
        - in: query
          name: redirect
          schema:
            type: string
          description: URL to redirect to after successful login
      responses:
        '302':
          description: Redirect to Slack authorization

  /auth/slack/callback:
    get:
      tags:
        - Auth
      summary: Slack OAuth callback
      description: Handles the redirect from Slack after authorization. Creates or links user, creates session, redirects to app.
      operationId: slackAuthCallback
      security: []
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
      responses:
        '302':
          description: Redirect to app with session token

  /slack/interactions:
    post:
      tags:
        - Auth
      summary: Slack interactivity webhook
      description: |
        Receives Slack Block Kit interaction callbacks (Approve / Deny button
        clicks on grant-request notifications). Authenticated by the Slack
        request signature (`X-Slack-Signature` / `X-Slack-Request-Timestamp`
        verified with the app signing secret), not a bearer token.

        Slack sends `application/x-www-form-urlencoded` with a single
        `payload` field containing the interaction JSON. The endpoint acks
        with `200` immediately (Slack's 3-second deadline) and processes the
        decision asynchronously; all user feedback is delivered back to Slack
        (message update, thread reply, or ephemeral message). Only registered
        when `DBB_SLACK_SIGNING_SECRET` is configured.
      operationId: slackInteractions
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: URL-encoded JSON interaction callback from Slack.
              required:
                - payload
      responses:
        '200':
          description: |
            Acknowledged. Returned for valid interactions (processed
            asynchronously) and for ignored ones (unknown action, non-UUID
            value) alike — an empty body so Slack shows the user nothing.
        '401':
          description: |
            Signature verification failed — missing/invalid signature,
            stale timestamp (>5 min), or oversized body. No body detail.

  /users:
    post:
      tags:
        - Users
      summary: Create a new user
      description: Creates a new user account. Requires admin role.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - Users
      summary: List users
      description: |
        Returns a list of users.

        - Admins see all users
        - Non-admins see only themselves
      operationId: listUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{uid}:
    parameters:
      - $ref: '#/components/parameters/UserUID'

    get:
      tags:
        - Users
      summary: Get user by UID
      description: Retrieves a specific user by their UID.
      operationId: getUser
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

    put:
      tags:
        - Users
      summary: Update user
      description: |
        Updates a user account.

        - Non-admins can only update their own password
        - Non-admins cannot change roles
        - API keys cannot change passwords (requires Basic Auth)
        - The admin role cannot be removed from the last remaining admin
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: The update would remove the admin role from the last admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Users
      summary: Delete user
      description: |
        Deletes a user account. Requires admin role.

        Note: Cannot delete your own user account, nor the last admin user.
      operationId: deleteUser
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Deleting this user would leave the instance without any admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{uid}/password:
    parameters:
      - $ref: '#/components/parameters/UserUID'

    put:
      tags:
        - Users
      summary: Change password (authenticated)
      description: |
        Changes a user's password. Requires re-authentication via username/password in the request body.

        **Important**: This endpoint does NOT use Bearer token authentication.
        Users must provide their username and current password for re-authentication.

        - Users can only change their own password
        - Admin users can change any user's password (with their own admin credentials)
        - Subject to rate limiting (same as login)
      operationId: changePassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Weak password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [weak_password]
                  message:
                    type: string
                required:
                  - error
                  - message
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Cannot change another user's password (non-admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/AuthRateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{uid}/reset-password:
    parameters:
      - $ref: '#/components/parameters/UserUID'

    post:
      tags:
        - Users
      summary: Reset user password (admin only)
      description: |
        Allows administrators to reset any user's password without knowing the current password.

        **Important**: This endpoint requires web session authentication (Bearer token from login).
        API keys cannot use this endpoint.

        The user's `password_change_required` flag is cleared after the reset.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request or weak password
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      error:
                        type: string
                        enum: [weak_password]
                      message:
                        type: string
                    required:
                      - error
                      - message
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Not authorized (non-admin or API key authentication)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /databases:
    post:
      tags:
        - Databases
      summary: Create database configuration
      description: Creates a new database configuration. Requires admin role.
      operationId: createDatabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatabaseRequest'
      responses:
        '200':
          description: Database created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - Databases
      summary: List databases
      description: |
        Returns a list of database configurations.

        Response varies by role:
        - **Admin**: Full details (host, port, database_name, username, ssl_mode)
        - **Viewer**: Limited info (uid, name, description)
        - **Connector**: Only databases they have active grants for (limited info)
      operationId: listDatabases
      responses:
        '200':
          description: List of databases
          content:
            application/json:
              schema:
                type: object
                properties:
                  databases:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/Database'
                        - $ref: '#/components/schemas/DatabaseLimited'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /databases/{uid}:
    parameters:
      - $ref: '#/components/parameters/DatabaseUID'

    get:
      tags:
        - Databases
      summary: Get database by UID
      description: |
        Retrieves a specific database configuration.

        Response varies by role:
        - **Admin**: Full details
        - **Viewer**: Limited info
        - **Connector**: Only if they have an active grant (limited info)
      operationId: getDatabase
      responses:
        '200':
          description: Database details
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Database'
                  - $ref: '#/components/schemas/DatabaseLimited'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

    put:
      tags:
        - Databases
      summary: Update database
      description: Updates a database configuration. Requires admin role.
      operationId: updateDatabase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatabaseRequest'
      responses:
        '200':
          description: Database updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Databases
      summary: Delete database
      description: Deletes a database configuration. Requires admin role.
      operationId: deleteDatabase
      responses:
        '200':
          description: Database deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /grants:
    post:
      tags:
        - Grants
      summary: Create access grant
      description: Creates a new access grant for a user to a database. Requires admin role.
      operationId: createGrant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantRequest'
      responses:
        '200':
          description: Grant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGrant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - Grants
      summary: List grants
      description: |
        Returns a list of access grants.

        Connectors can only see their own grants.
      operationId: listGrants
      parameters:
        - name: user_id
          in: query
          description: Filter by user UID
          schema:
            type: string
            format: uuid
        - name: database_id
          in: query
          description: Filter by database UID
          schema:
            type: string
            format: uuid
        - name: active_only
          in: query
          description: Only return active (non-revoked, within time window) grants
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of grants
          content:
            application/json:
              schema:
                type: object
                properties:
                  grants:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessGrant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /grants/{uid}:
    parameters:
      - $ref: '#/components/parameters/GrantUID'

    get:
      tags:
        - Grants
      summary: Get grant by UID
      description: |
        Retrieves a specific access grant.

        Connectors can only see their own grants.
      operationId: getGrant
      responses:
        '200':
          description: Grant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessGrant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

    delete:
      tags:
        - Grants
      summary: Revoke grant
      description: Revokes an access grant. Requires admin role.
      operationId: revokeGrant
      responses:
        '200':
          description: Grant revoked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /grant-definitions:
    post:
      tags:
        - Grant Definitions
      summary: Create grant definition (admin)
      description: |
        Creates a new admin-managed grant definition. Definitions are templates
        for the grant request workflow — users can request grants only by
        picking an active definition. Direct admin grant creation
        (`POST /grants`) bypasses definitions.
      operationId: createGrantDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantDefinitionRequest'
      responses:
        '200':
          description: Definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - Grant Definitions
      summary: List grant definitions
      description: |
        Lists grant definitions. Non-admins always receive only active
        definitions. Admins can pass `active_only=true` to apply the same
        filter for the request UI; otherwise both active and deactivated
        definitions are returned.
      operationId: listGrantDefinitions
      parameters:
        - name: active_only
          in: query
          description: Restrict to active definitions
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of grant definitions
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant_definitions:
                    type: array
                    items:
                      $ref: '#/components/schemas/GrantDefinition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /grant-definitions/{uid}:
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Grant Definitions
      summary: Get grant definition by UID
      operationId: getGrantDefinition
      responses:
        '200':
          description: Definition details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantDefinition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Grant Definitions
      summary: Update grant definition (admin)
      description: Replaces the editable fields (uid / created_by / created_at / is_active stay put).
      operationId: updateGrantDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantDefinitionRequest'
      responses:
        '200':
          description: Definition updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantDefinition'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Grant Definitions
      summary: Deactivate grant definition (admin)
      description: |
        Soft-deletes by flipping `is_active` to false. Definitions are not
        hard-deleted because grant requests reference them and the audit
        trail needs to stay intact.
      operationId: deactivateGrantDefinition
      responses:
        '200':
          description: Definition deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /grant-requests:
    post:
      tags:
        - Grant Requests
      summary: Submit a grant request
      description: |
        Any authenticated user can request access by selecting a grant
        definition and a database. An admin then approves or denies. On
        approval, dbbat creates a real AccessGrant from the definition.
      operationId: createGrantRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantRequestPayload'
      responses:
        '200':
          description: Grant request submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantRequest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A pending request already exists for this user/database/definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - Grant Requests
      summary: List grant requests
      description: Admins see all (filterable). Non-admins see only their own.
      operationId: listGrantRequests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, denied, cancelled, expired]
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: database_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of grant requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant_requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/GrantRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /grant-requests/{uid}:
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Grant Requests
      summary: Get grant request
      operationId: getGrantRequest
      responses:
        '200':
          description: Grant request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /grant-requests/{uid}/approve:
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Grant Requests
      summary: Approve grant request (admin)
      description: |
        Atomically transitions pending → approved and creates a real
        AccessGrant from the linked definition + the request's
        user/database. Returns 409 if not pending or if the linked
        definition has been deactivated.
      operationId: approveGrantRequest
      responses:
        '200':
          description: Approved; resulting grant included
          content:
            application/json:
              schema:
                type: object
                properties:
                  grant_request:
                    $ref: '#/components/schemas/GrantRequest'
                  grant:
                    $ref: '#/components/schemas/AccessGrant'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Not pending or definition inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /grant-requests/{uid}/deny:
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Grant Requests
      summary: Deny grant request (admin)
      operationId: denyGrantRequest
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Not pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /grant-requests/{uid}/cancel:
    parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags:
        - Grant Requests
      summary: Cancel grant request (requester or admin)
      operationId: cancelGrantRequest
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Not pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /keys:
    post:
      tags:
        - API Keys
      summary: Create API key
      description: |
        Creates a new API key for the authenticated user.

        **Important**: The full API key is only returned once in this response.
        Store it securely as it cannot be retrieved later.

        Requires Web Session or Basic Auth (API keys cannot create other API keys).
      operationId: createAPIKey
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags:
        - API Keys
      summary: List API keys
      description: |
        Returns a list of API keys.

        - Default for every caller, including admins: only the caller's own
          keys.
        - Admins can override the default with `all_users=true` (every user's
          keys) or `user_id=<uuid>` (one specific user's keys). If both are
          given, `user_id` wins.
        - Non-admins can never see another user's keys: `all_users` and
          `user_id` are ignored for them.
      operationId: listAPIKeys
      parameters:
        - name: user_id
          in: query
          description: >-
            Return only this user's keys (admin only). Overrides the
            own-keys-by-default behavior; wins over all_users if both are set.
          schema:
            type: string
            format: uuid
        - name: all_users
          in: query
          description: >-
            Return every user's keys instead of just the caller's own (admin
            only; ignored for non-admins).
          schema:
            type: boolean
            default: false
        - name: include_all
          in: query
          description: Include revoked and expired keys
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: API key ID
        schema:
          type: string
          format: uuid

    get:
      tags:
        - API Keys
      summary: Get API key by ID
      description: |
        Retrieves a specific API key.

        Non-admins can only see their own keys.
      operationId: getAPIKey
      responses:
        '200':
          description: API key details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

    delete:
      tags:
        - API Keys
      summary: Revoke API key
      description: |
        Revokes an API key.

        - Non-admins can only revoke their own keys
        - Requires Web Session or Basic Auth (API keys cannot revoke API keys)
      operationId: revokeAPIKey
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        '204':
          description: API key revoked successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /connections:
    get:
      tags:
        - Connections
      summary: List connections
      description: |
        Returns a list of proxy connections.

        Connectors can only see their own connections.
      operationId: listConnections
      parameters:
        - name: user_id
          in: query
          description: Filter by user UID
          schema:
            type: string
            format: uuid
        - name: database_id
          in: query
          description: Filter by database UID
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of connections
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: '#/components/schemas/Connection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /queries:
    get:
      tags:
        - Queries
      summary: List queries
      description: |
        Returns a list of executed queries.

        Requires admin or viewer role.
      operationId: listQueries
      parameters:
        - name: connection_id
          in: query
          description: Filter by connection UID
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          description: Filter by user UID
          schema:
            type: string
            format: uuid
        - name: database_id
          in: query
          description: Filter by database UID
          schema:
            type: string
            format: uuid
        - name: start_time
          in: query
          description: Filter by start time (RFC3339 format)
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: Filter by end time (RFC3339 format)
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of queries
          content:
            application/json:
              schema:
                type: object
                properties:
                  queries:
                    type: array
                    items:
                      $ref: '#/components/schemas/Query'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /queries/{uid}:
    parameters:
      - $ref: '#/components/parameters/QueryUID'

    get:
      tags:
        - Queries
      summary: Get query details
      description: |
        Retrieves a specific query without its result rows.

        Use `GET /queries/{uid}/rows` to retrieve the result rows.

        Requires admin or viewer role.
      operationId: getQuery
      responses:
        '200':
          description: Query details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Query'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /queries/{uid}/rows:
    parameters:
      - $ref: '#/components/parameters/QueryUID'

    get:
      tags:
        - Queries
      summary: List query result rows (paginated)
      description: |
        Retrieves paginated result rows for a specific query.

        Uses cursor-based pagination with two limits per request:
        - Maximum 1000 rows per response
        - Maximum 1MB of row data per response

        The response stops at whichever limit is reached first.

        Requires admin or viewer role.
      operationId: getQueryRows
      parameters:
        - name: cursor
          in: query
          description: Pagination cursor from previous response
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of rows to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Query rows retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryRowsResponse'
        '400':
          description: Invalid cursor or limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /audit:
    get:
      tags:
        - Audit
      summary: List audit events
      description: |
        Returns a list of audit log events.

        Requires admin or viewer role.
      operationId: listAudit
      parameters:
        - name: event_type
          in: query
          description: Filter by event type (e.g., user.created, grant.revoked)
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by user UID (the user being acted upon)
          schema:
            type: string
            format: uuid
        - name: performed_by
          in: query
          description: Filter by performer UID (the user performing the action)
          schema:
            type: string
            format: uuid
        - name: start_time
          in: query
          description: Filter by start time (RFC3339 format)
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          description: Filter by end time (RFC3339 format)
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_events:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /databases/{uid}/connection:
    get:
      tags:
        - Databases
      summary: Get connection URL template for a database
      description: |
        Returns a connection URL with `{DBBAT_KEY}` placeholder for the specified database.
        - Admin callers: always 200.
        - Non-admin callers: 200 if they have at least one active grant; 404 otherwise (to avoid leaking database existence).
        - If the protocol proxy is disabled (resolved port = 0): returns 409.
      operationId: getDatabaseConnection
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Connection URL template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Protocol proxy is disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          $ref: '#/components/responses/InternalError'

  /parameters:
    get:
      tags:
        - Parameters
      summary: List all active parameters
      description: Returns all active global parameters. Admin-only. Optional `group_key` query filter.
      operationId: listParameters
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: group_key
          in: query
          description: Filter by group key
          schema:
            type: string
      responses:
        '200':
          description: List of parameters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GlobalParameter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /parameters/{group}/{key}:
    get:
      tags:
        - Parameters
      summary: Get a single parameter
      operationId: getParameter
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: group
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalParameter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
        - Parameters
      summary: Create or update a parameter
      operationId: setParameter
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: group
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetParameterRequest'
      responses:
        '200':
          description: Updated parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalParameter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Parameters
      summary: Delete a parameter
      operationId: deleteParameter
      security:
        - basicAuth: []
        - bearerAuth: []
      parameters:
        - name: group
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Parameter deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /instance:
    get:
      tags:
        - Instance
      summary: Get instance information
      description: Returns listen addresses, public endpoint settings, and resolved connection info. Any authenticated user can call this endpoint; non-admins receive only `listen` and `resolved`.
      operationId: getInstance
      security:
        - basicAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Instance information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /instance/public:
    put:
      tags:
        - Instance
      summary: Update public endpoint settings
      description: Atomically upserts all public.* parameters. Admin-only.
      operationId: updateInstancePublic
      security:
        - basicAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicEndpoints'
      responses:
        '204':
          description: Settings saved
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication (username:password)
    bearerAuth:
      type: http
      scheme: bearer
      description: API key authentication (Bearer token)

  parameters:
    UserUID:
      name: uid
      in: path
      required: true
      description: User UID
      schema:
        type: string
        format: uuid

    DatabaseUID:
      name: uid
      in: path
      required: true
      description: Database UID
      schema:
        type: string
        format: uuid

    GrantUID:
      name: uid
      in: path
      required: true
      description: Grant UID
      schema:
        type: string
        format: uuid

    QueryUID:
      name: uid
      in: path
      required: true
      description: Query UID
      schema:
        type: string
        format: uuid

    Limit:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000

    Offset:
      name: offset
      in: query
      description: Number of results to skip for pagination
      schema:
        type: integer
        default: 0
        minimum: 0

  schemas:
    # Version schemas
    VersionInfo:
      type: object
      description: API and build version information
      properties:
        api_version:
          type: string
          description: API version (e.g., "v1")
          example: v1
        build_version:
          type: string
          description: Build version
          example: 1.2.3
        build_commit:
          type: string
          description: Git commit hash
          example: abc1234
        build_time:
          type: string
          format: date-time
          description: Build timestamp
          example: "2026-01-09T12:00:00Z"
        run_mode:
          type: string
          description: |
            Run mode of the server. Empty string for production, "test" for test mode, "demo" for demo mode.
          example: ""
      required:
        - api_version
        - build_version
        - build_commit
        - build_time
        - run_mode

    # Auth schemas
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          format: password
          description: Password
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Web session token (use as Bearer token)
        expires_at:
          type: string
          format: date-time
          description: Token expiration time
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
        - token
        - expires_at
        - user

    AuthUser:
      type: object
      description: User info returned in auth responses
      properties:
        uid:
          type: string
          format: uuid
          description: User UID
        username:
          type: string
          description: Username
        roles:
          type: array
          items:
            type: string
            enum: [admin, viewer, connector]
          description: User roles
        password_change_required:
          type: boolean
          description: Whether user must change their password
      required:
        - uid
        - username
        - roles
        - password_change_required

    MeResponse:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: User UID
        username:
          type: string
          description: Username
        roles:
          type: array
          items:
            type: string
            enum: [admin, viewer, connector]
          description: User roles
        password_change_required:
          type: boolean
          description: Whether user must change their password
        session:
          $ref: '#/components/schemas/SessionInfo'
      required:
        - uid
        - username
        - roles
        - password_change_required
        - session

    SessionInfo:
      type: object
      description: Current session information
      properties:
        expires_at:
          type: string
          format: date-time
          description: Session expiration time
        created_at:
          type: string
          format: date-time
          description: Session creation time

    ChangePasswordRequest:
      type: object
      description: Request for authenticated password change (re-authentication required)
      properties:
        username:
          type: string
          description: Username for re-authentication
        current_password:
          type: string
          format: password
          description: Current password for re-authentication
        new_password:
          type: string
          format: password
          description: New password (minimum 8 characters)
      required:
        - username
        - current_password
        - new_password

    PreLoginPasswordChangeRequest:
      type: object
      description: Request for pre-login password change (no token required)
      properties:
        username:
          type: string
          description: Username
        current_password:
          type: string
          format: password
          description: Current/temporary password
        new_password:
          type: string
          format: password
          description: New password (minimum 8 characters)
      required:
        - username
        - current_password
        - new_password

    ResetPasswordRequest:
      type: object
      description: Request for admin password reset (web session required)
      properties:
        new_password:
          type: string
          format: password
          minLength: 8
          description: New password for the user (minimum 8 characters)
      required:
        - new_password

    # User schemas
    User:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        username:
          type: string
          description: Username
        roles:
          type: array
          items:
            type: string
            enum: [admin, viewer, connector]
          description: User roles
        rate_limit_exempt:
          type: boolean
          description: Whether user bypasses rate limiting
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - uid
        - username
        - roles
        - rate_limit_exempt
        - created_at
        - updated_at

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Username
        password:
          type: string
          minLength: 1
          description: Password
        roles:
          type: array
          items:
            type: string
            enum: [admin, viewer, connector]
          description: User roles
      required:
        - username
        - password

    UpdateUserRequest:
      type: object
      properties:
        password:
          type: string
          description: New password
        roles:
          type: array
          items:
            type: string
            enum: [admin, viewer, connector]
          description: New roles (admin only)

    # Database schemas
    Database:
      type: object
      description: Full database details (admin only)
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        name:
          type: string
          description: Database configuration name
        description:
          type: string
          description: Description
        host:
          type: string
          description: Target database host
        port:
          type: integer
          description: Target database port
        database_name:
          type: string
          description: Target database name
        username:
          type: string
          description: Target database username
        ssl_mode:
          type: string
          description: SSL mode (disable, prefer, require, etc.)
        protocol:
          type: string
          enum: [postgresql, oracle, mysql, mariadb, mongodb]
          description: Database protocol
        oracle_service_name:
          type: string
          description: Oracle SERVICE_NAME (Oracle only)
        listable:
          type: boolean
          default: true
          description: Whether this database appears in the grant-request dropdown for non-admin users
        created_by:
          type: string
          format: uuid
          nullable: true
          description: User who created this configuration
      required:
        - uid
        - name

    DatabaseLimited:
      type: object
      description: Limited database info for non-admin users
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        name:
          type: string
          description: Database configuration name
        description:
          type: string
          description: Description
      required:
        - uid
        - name

    CreateDatabaseRequest:
      type: object
      properties:
        name:
          type: string
          description: Unique name for this database configuration
        description:
          type: string
          description: Description
        host:
          type: string
          description: Target database host
        port:
          type: integer
          default: 5432
          description: Target database port
        database_name:
          type: string
          description: Target database name
        username:
          type: string
          description: Target database username
        password:
          type: string
          description: Target database password (encrypted at rest)
        ssl_mode:
          type: string
          default: prefer
          description: SSL mode
        protocol:
          type: string
          enum: [postgresql, oracle, mysql, mariadb, mongodb]
          default: postgresql
          description: Database protocol
        oracle_service_name:
          type: string
          description: Oracle SERVICE_NAME (required for Oracle)
        listable:
          type: boolean
          default: true
          description: Whether this database appears in the grant-request dropdown for non-admin users
      required:
        - name
        - host
        - username
        - password

    UpdateDatabaseRequest:
      type: object
      properties:
        description:
          type: string
          description: Description
        host:
          type: string
          description: Target database host
        port:
          type: integer
          description: Target database port
        database_name:
          type: string
          description: Target database name
        username:
          type: string
          description: Target database username
        password:
          type: string
          description: Target database password (encrypted at rest)
        ssl_mode:
          type: string
          description: SSL mode
        protocol:
          type: string
          enum: [postgresql, oracle, mysql, mariadb, mongodb]
          description: Database protocol
        oracle_service_name:
          type: string
          description: Oracle SERVICE_NAME
        listable:
          type: boolean
          description: Whether this database appears in the grant-request dropdown for non-admin users

    # Grant schemas
    GrantControl:
      type: string
      enum:
        - read_only
        - block_copy
        - block_ddl
      description: |
        Control types that can be applied to a grant:
        - `read_only`: Enables PostgreSQL session read-only mode and blocks write queries
        - `block_copy`: Blocks all COPY commands (both TO and FROM)
        - `block_ddl`: Blocks DDL statements (CREATE, ALTER, DROP, TRUNCATE)

    GrantRequest:
      type: object
      description: |
        A user-initiated request for a grant of a particular shape on a
        particular database. Lifecycle: pending → approved/denied/cancelled.
        On approval the system creates a real AccessGrant (referenced via
        resulting_grant_id).
      properties:
        uid:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        grant_definition_id:
          type: string
          format: uuid
        database_id:
          type: string
          format: uuid
        justification:
          type: string
          maxLength: 1000
        status:
          type: string
          enum: [pending, approved, denied, cancelled, expired]
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
          nullable: true
        decided_by:
          type: string
          format: uuid
          nullable: true
        decision_reason:
          type: string
          nullable: true
        resulting_grant_id:
          type: string
          format: uuid
          nullable: true
      required:
        - uid
        - user_id
        - grant_definition_id
        - database_id
        - status
        - requested_at

    CreateGrantRequestPayload:
      type: object
      properties:
        grant_definition_id:
          type: string
          format: uuid
        database_id:
          type: string
          format: uuid
        justification:
          type: string
          maxLength: 1000
      required:
        - grant_definition_id
        - database_id

    GrantDefinition:
      type: object
      description: |
        Admin-managed template describing a *shape* of grant. Grant requests
        (separate workflow) reference a definition; on approval a real
        AccessGrant is built from the definition + the request's
        user/database. Direct admin grant creation bypasses definitions.
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        description:
          type: string
        duration_seconds:
          type: integer
          format: int64
          minimum: 1
          description: How long the resulting grant remains valid after approval.
        controls:
          type: array
          items:
            $ref: '#/components/schemas/GrantControl'
        max_query_counts:
          type: integer
          format: int64
          nullable: true
        max_bytes_transferred:
          type: integer
          format: int64
          nullable: true
        is_active:
          type: boolean
          readOnly: true
          description: Soft-deleted definitions have is_active=false; they remain referenced by historical grant requests.
        created_by:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - uid
        - name
        - duration_seconds
        - controls
        - is_active
        - created_by
        - created_at

    CreateGrantDefinitionRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
        description:
          type: string
        duration_seconds:
          type: integer
          format: int64
          minimum: 1
        controls:
          type: array
          items:
            $ref: '#/components/schemas/GrantControl'
          default: []
        max_query_counts:
          type: integer
          format: int64
          nullable: true
        max_bytes_transferred:
          type: integer
          format: int64
          nullable: true
      required:
        - name
        - duration_seconds

    AccessGrant:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        user_id:
          type: string
          format: uuid
          description: User UID
        database_id:
          type: string
          format: uuid
          description: Database UID
        controls:
          type: array
          items:
            $ref: '#/components/schemas/GrantControl'
          description: List of controls applied. Empty array means full write access.
        granted_by:
          type: string
          format: uuid
          description: Admin who granted access
        starts_at:
          type: string
          format: date-time
          description: When access starts
        expires_at:
          type: string
          format: date-time
          description: When access expires
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: When access was revoked (null if active)
        revoked_by:
          type: string
          format: uuid
          nullable: true
          description: Admin who revoked access
        max_query_counts:
          type: integer
          format: int64
          nullable: true
          description: Maximum queries allowed (quota)
        max_bytes_transferred:
          type: integer
          format: int64
          nullable: true
          description: Maximum bytes transferred (quota)
        query_count:
          type: integer
          format: int64
          description: Current query count
        bytes_transferred:
          type: integer
          format: int64
          description: Current bytes transferred
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
      required:
        - uid
        - user_id
        - database_id
        - controls
        - granted_by
        - starts_at
        - expires_at
        - created_at

    CreateGrantRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          description: User UID
        database_id:
          type: string
          format: uuid
          description: Database UID
        controls:
          type: array
          items:
            $ref: '#/components/schemas/GrantControl'
          default: []
          description: List of controls to apply. Empty array means full write access.
        starts_at:
          type: string
          format: date-time
          description: When access starts
        expires_at:
          type: string
          format: date-time
          description: When access expires (must be after starts_at)
        max_query_counts:
          type: integer
          format: int64
          description: Maximum queries allowed (quota)
        max_bytes_transferred:
          type: integer
          format: int64
          description: Maximum bytes transferred (quota)
      required:
        - user_id
        - database_id
        - starts_at
        - expires_at

    # API Key schemas
    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        user_id:
          type: string
          format: uuid
          description: User UID
        name:
          type: string
          description: Key name
        key_prefix:
          type: string
          description: Key prefix for identification
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the key expires
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: When the key was last used
        request_count:
          type: integer
          format: int64
          description: Total requests made with this key
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        revoked_at:
          type: string
          format: date-time
          nullable: true
          description: When the key was revoked
        revoked_by:
          type: string
          format: uuid
          nullable: true
          description: User who revoked the key
      required:
        - id
        - user_id
        - name
        - key_prefix
        - request_count
        - created_at

    CreateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Key name
        expires_at:
          type: string
          format: date-time
          description: Optional expiration time
      required:
        - name

    CreateAPIKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        name:
          type: string
          description: Key name
        key:
          type: string
          description: Full API key (only shown once!)
        key_prefix:
          type: string
          description: Key prefix for identification
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the key expires
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        connections:
          type: array
          description: Connection URLs for databases the key's owner has active grants on
          items:
            $ref: '#/components/schemas/ConnectionInfo'
        connections_truncated:
          type: boolean
          description: True when there are more than 50 connections (list is truncated)
      required:
        - id
        - name
        - key
        - key_prefix
        - created_at
        - connections
        - connections_truncated

    # Connection schemas
    Connection:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        user_id:
          type: string
          format: uuid
          description: User UID
        database_id:
          type: string
          format: uuid
          description: Database UID
        source_ip:
          type: string
          description: Client IP address
        connected_at:
          type: string
          format: date-time
          description: Connection start time
        last_activity_at:
          type: string
          format: date-time
          description: Last activity timestamp
        disconnected_at:
          type: string
          format: date-time
          nullable: true
          description: Connection end time (null if still connected)
        queries:
          type: integer
          format: int64
          description: Number of queries executed
        bytes_transferred:
          type: integer
          format: int64
          description: Total bytes transferred
      required:
        - uid
        - user_id
        - database_id
        - source_ip
        - connected_at
        - last_activity_at
        - queries
        - bytes_transferred

    # Query schemas
    Query:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        connection_id:
          type: string
          format: uuid
          description: Connection UID
        user_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            UID of the user who ran the query, resolved from the connection.
            Only populated when listing queries.
        database_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            UID of the target database, resolved from the connection.
            Only populated when listing queries.
        sql_text:
          type: string
          description: SQL query text
        parameters:
          $ref: '#/components/schemas/QueryParameters'
        executed_at:
          type: string
          format: date-time
          description: Execution timestamp
        duration_ms:
          type: number
          format: double
          nullable: true
          description: Execution duration in milliseconds
        rows_affected:
          type: integer
          format: int64
          nullable: true
          description: Number of rows affected
        error:
          type: string
          nullable: true
          description: Error message if query failed
      required:
        - uid
        - connection_id
        - sql_text
        - executed_at

    QueryParameters:
      type: object
      description: Query parameter values (for prepared statements)
      properties:
        values:
          type: array
          items:
            type: string
          description: Decoded string representations
        raw:
          type: array
          items:
            type: string
          description: Base64-encoded raw bytes
        format_codes:
          type: array
          items:
            type: integer
          description: Format codes (0=text, 1=binary)
        type_oids:
          type: array
          items:
            type: integer
          description: PostgreSQL type OIDs

    QueryWithRows:
      allOf:
        - $ref: '#/components/schemas/Query'
        - type: object
          properties:
            rows:
              type: array
              items:
                $ref: '#/components/schemas/QueryRow'
              description: Result rows (from SELECT or COPY operations)

    QueryRow:
      type: object
      properties:
        row_number:
          type: integer
          description: Row index
        row_data:
          type: object
          additionalProperties: true
          description: Row data as JSON object
        row_size_bytes:
          type: integer
          format: int64
          description: Row size in bytes
      required:
        - row_number
        - row_data
        - row_size_bytes

    QueryRowsResponse:
      type: object
      description: Paginated query rows response
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/QueryRow'
          description: Array of row objects
        next_cursor:
          type: string
          nullable: true
          description: Cursor for the next page (null if no more rows)
        has_more:
          type: boolean
          description: Whether more rows are available
        total_rows:
          type: integer
          format: int64
          description: Total number of rows for this query
      required:
        - rows
        - has_more
        - total_rows

    # Audit schemas
    AuditEvent:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: Unique identifier
        event_type:
          type: string
          description: Event type (e.g., user.created, grant.revoked)
        user_id:
          type: string
          format: uuid
          nullable: true
          description: User being acted upon
        performed_by:
          type: string
          format: uuid
          nullable: true
          description: User performing the action
        details:
          type: object
          additionalProperties: true
          description: Event-specific details
        created_at:
          type: string
          format: date-time
          description: Event timestamp
      required:
        - uid
        - event_type
        - created_at

    # Connection URL schemas
    ConnectionInfo:
      type: object
      description: Ready-to-paste connection URL for a database
      properties:
        database_uid:
          type: string
          format: uuid
        database_name:
          type: string
        protocol:
          type: string
        format:
          type: string
          description: '"uri" or "ez-connect"'
          enum:
            - uri
            - ez-connect
        url:
          type: string
          description: Ready-to-paste connection URL
      required:
        - database_uid
        - database_name
        - protocol
        - format
        - url

    # Global parameters schemas
    GlobalParameter:
      type: object
      description: A runtime-editable key-value configuration entry
      properties:
        uid:
          type: string
          format: uuid
        group_key:
          type: string
        key:
          type: string
        value:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - uid
        - group_key
        - key
        - value
        - created_at
        - updated_at

    SetParameterRequest:
      type: object
      properties:
        value:
          type: string
      required:
        - value

    PublicEndpoints:
      type: object
      description: >-
        Public endpoint advertisement settings. Covers two independent
        network paths: the *connection* host (host/pg_host/ora_host/
        mysql_host/*_port — where SQL clients reach the PG/Oracle/MySQL
        proxies, via direct or TCP-load-balancer access) and the *Web UI*
        host (web_ui_url — where the browser and REST API are reached,
        behind an HTTP ingress / reverse proxy). These are typically two
        different DNS names on two different network paths.
      properties:
        host:
          type: string
          description: Default public hostname for all protocols (the connection host, e.g. db.company.com)
        pg_host:
          type: string
          description: PostgreSQL-specific host override (empty = use host)
        ora_host:
          type: string
          description: Oracle-specific host override (empty = use host)
        mysql_host:
          type: string
          description: MySQL-specific host override (empty = use host)
        mongo_host:
          type: string
          description: MongoDB-specific host override (empty = use host)
        pg_port:
          type: integer
          nullable: true
          description: PostgreSQL port override (null = use local listen port)
        ora_port:
          type: integer
          nullable: true
          description: Oracle port override (null = use local listen port)
        mysql_port:
          type: integer
          nullable: true
          description: MySQL port override (null = use local listen port)
        mongo_port:
          type: integer
          nullable: true
          description: MongoDB port override (null = use local listen port)
        web_ui_url:
          type: string
          description: >-
            Web UI / public base URL override (e.g. https://dbbat.company.com),
            reached through an HTTP ingress / reverse proxy. Empty = fall
            back to the DBB_PUBLIC_URL environment variable. Used for Slack
            deep-links and other absolute-URL generation. Independent of
            `host`, which advertises the connection host instead.

    ResolvedEndpoints:
      type: object
      description: Fully resolved connection advertisement values after fallback chains
      properties:
        pg_host:
          type: string
        pg_port:
          type: integer
          description: 0 = protocol disabled
        ora_host:
          type: string
        ora_port:
          type: integer
        mysql_host:
          type: string
        mysql_port:
          type: integer
        mongo_host:
          type: string
        mongo_port:
          type: integer
        web_ui_url:
          type: string
          description: Effective Web UI / public base URL (web_ui_url parameter, falling back to DBB_PUBLIC_URL)
      required:
        - pg_host
        - pg_port
        - ora_host
        - ora_port
        - mysql_host
        - mysql_port
        - mongo_host
        - mongo_port
        - web_ui_url

    InstanceInfo:
      type: object
      description: Instance information including listen addresses and public endpoint config
      properties:
        listen:
          type: object
          description: >-
            Live listen addresses this process is bound to, straight from
            config (DBB_LISTEN_*). `api` is the HTTP listener (REST API +
            Web UI, meant for an HTTP reverse proxy / ingress); `pg`, `ora`,
            and `mysql` are TCP listeners (SQL client proxies, meant for a
            TCP load balancer).
          properties:
            pg:
              type: string
              description: PostgreSQL proxy TCP listen address
            ora:
              type: string
              description: Oracle proxy TCP listen address
            mysql:
              type: string
              description: MySQL/MariaDB proxy TCP listen address
            mongo:
              type: string
              description: MongoDB proxy TCP listen address
            api:
              type: string
              description: REST API / Web UI HTTP listen address
          required:
            - pg
            - ora
            - mysql
            - api
        public:
          $ref: '#/components/schemas/PublicEndpoints'
          nullable: true
          description: Only present for admin callers
        resolved:
          $ref: '#/components/schemas/ResolvedEndpoints'
      required:
        - listen
        - resolved

    # Common schemas
    Error:
      type: object
      description: Standard error response
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - INTERNAL_ERROR
            - VALIDATION_ERROR
            - NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - INVALID_CREDENTIALS
            - PASSWORD_CHANGE_REQUIRED
            - WEAK_PASSWORD
            - RATE_LIMITED
            - DUPLICATE_NAME
            - TARGET_MATCHES_SELF
            - GRANT_EXPIRED
            - QUOTA_EXCEEDED
        message:
          type: string
          description: Human-readable error message
        detail:
          type: string
          description: Additional context
        retry_after:
          type: integer
          description: Seconds until retry (rate-limited responses only)
      required:
        - code
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
      required:
        - message

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    AuthRateLimited:
      description: Too many failed authentication attempts
      headers:
        Retry-After:
          description: Seconds until retry is allowed
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Insufficient permissions or password change required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    PasswordChangeRequired:
      description: User must change their initial password before accessing the API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until retry is allowed
          schema:
            type: integer
        X-RateLimit-Limit:
          description: Maximum requests per minute
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Remaining requests in current window
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Unix timestamp when limit resets
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
