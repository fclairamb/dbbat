{{- if .Values.service.proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dbbat.fullname" . }}-proxy
  labels:
    {{- include "dbbat.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
  {{- with .Values.service.proxy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.proxy.type }}
  ports:
    - port: {{ .Values.service.proxy.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
    {{- if .Values.service.oracle.enabled }}
    - port: {{ .Values.service.oracle.port }}
      targetPort: oracle
      protocol: TCP
      name: oracle
    {{- end }}
    {{- if .Values.service.mysql.enabled }}
    - port: {{ .Values.service.mysql.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
    {{- end }}
  selector:
    {{- include "dbbat.selectorLabels" . | nindent 4 }}
{{- end }}
