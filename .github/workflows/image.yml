# Build and push an intermediate Docker image when a commit message contains #image.
# This enables fast testing of unreleased changes without waiting for the full release pipeline.
# Image tag: ghcr.io/fclairamb/dbbat:<git-describe> (e.g. v0.6.0-3-gabc1234)
name: Image

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -qi '#image'; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-image:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # needed for git describe

      - name: Compute image tag
        id: tag
        run: |
          DESC=$(git describe --tags --always)
          echo "tag=${DESC}" >> $GITHUB_OUTPUT
          echo "Image tag: ${DESC}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get git timestamp
        id: git
        run: echo "time=$(TZ=UTC git log -1 --format=%cd --date=format-local:%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/fclairamb/dbbat:${{ steps.tag.outputs.tag }}
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
            COMMIT=${{ github.sha }}
            GIT_TIME=${{ steps.git.outputs.time }}
          labels: |
            org.opencontainers.image.title=dbbat
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.git.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🐳 Intermediate image pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`ghcr.io/fclairamb/dbbat:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "helm upgrade dbbat oci://ghcr.io/fclairamb/charts/dbbat --set image.tag=${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
